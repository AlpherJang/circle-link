syntax = "proto3";

package circlelink.relay.v1;

option go_package = "github.com/circle-link/circle-link/protocol/gen/go/relay/v1;relayv1";

import "common/v1/common.proto";

message SessionBind {
  string access_token = 1;
  string user_id = 2;
  string device_id = 3;
}

message MessageEnvelope {
  string message_id = 1;
  string conversation_id = 2;
  string sender_user_id = 3;
  string sender_device_id = 4;
  string recipient_user_id = 5;
  string recipient_device_id = 6;
  uint64 sent_at_unix = 7;
  bytes header = 8;
  bytes ratchet_public_key = 9;
  bytes ciphertext = 10;
  string content_type = 11;
  uint64 client_message_seq = 12;
  bool offline_eligible = 13;
  circlelink.common.v1.RetentionMode retention_mode = 14;
  uint64 disappear_after_seconds = 15;
  uint64 expires_at_unix = 16;
}

message DeliveryAck {
  string message_id = 1;
  string recipient_device_id = 2;
  circlelink.common.v1.AckStatus status = 3;
  uint64 acked_at_unix = 4;
  bool from_mailbox = 5;
}

message DeliveryNack {
  string message_id = 1;
  string reason_code = 2;
  string reason_message = 3;
}

message PresenceSnapshot {
  repeated string online_user_ids = 1;
  repeated string online_device_ids = 2;
}

message PresenceUpdate {
  string user_id = 1;
  string device_id = 2;
  bool online = 3;
  uint64 updated_at_unix = 4;
}

message ClientEvent {
  oneof payload {
    SessionBind session_bind = 1;
    MessageEnvelope message_send = 2;
    DeliveryAck message_ack = 3;
  }
}

message ServerEvent {
  oneof payload {
    PresenceSnapshot presence_snapshot = 1;
    PresenceUpdate presence_update = 2;
    MessageEnvelope message_deliver = 3;
    MessageEnvelope message_mailbox = 4;
    DeliveryNack delivery_nack = 5;
    DeliveryAck delivery_ack = 6;
    circlelink.common.v1.ErrorDetail system_error = 7;
  }
}
